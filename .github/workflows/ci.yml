name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Subir servicos com Docker Compose
        run: docker compose -f backend/docker-compose.test.yml up -d mongo redis

      - name: Aguardar MongoDB
        run: |
          for i in {1..30}; do
            if docker compose -f backend/docker-compose.test.yml exec -T mongo mongosh --eval "db.adminCommand('ping')" >/dev/null 2>&1; then
              echo "MongoDB pronto"
              break
            fi
            sleep 2
          done

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias
        run: npm ci
        working-directory: backend

      - name: Rodar testes
        env:
          MONGODB_URI: mongodb://localhost:27017/solid_arch_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: npm test -- --coverage
        working-directory: backend

      - name: Limpar containers
        if: always()
        run: docker compose -f backend/docker-compose.test.yml down -v