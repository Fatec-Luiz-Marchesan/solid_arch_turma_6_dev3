version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: build     
    container_name: solid_arch_app_test
    environment:
      NODE_ENV: test
      MONGODB_URI: mongodb://mongo:27017/solid_arch_test
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_started

  mongo:
    image: mongo:7
    tmpfs: /data/db      
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    tmpfs: /data